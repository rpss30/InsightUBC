<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>InsightUBC</title>
	<link rel="stylesheet" href="styles.css">
	<script src="https://d3js.org/d3.v7.min.js"></script>
	<script src="https://unpkg.com/lucide@latest"></script>
	<script src="app.js" defer></script>
</head>
<body>
	<header class="topbar">
		<div>
			<p class="eyebrow">CPSC 310 dataset explorer</p>
			<h1>InsightUBC</h1>
		</div>
		<div class="api-pill" id="apiStatus">
			<span class="status-dot"></span>
			<span>Checking API</span>
		</div>
	</header>

	<main class="app-shell">
		<section class="workspace-grid" aria-label="Dataset tools">
			<form class="panel" id="uploadForm">
				<div class="panel-heading">
					<div>
						<p class="eyebrow">Dataset</p>
						<h2>Add Dataset</h2>
					</div>
					<i data-lucide="database"></i>
				</div>
				<div class="field-grid">
					<label>
						<span>ID</span>
						<input id="datasetId" name="datasetId" type="text" autocomplete="off" placeholder="sections">
					</label>
					<label>
						<span>Kind</span>
						<select id="datasetKind" name="datasetKind">
							<option value="sections">Sections</option>
							<option value="rooms">Rooms</option>
						</select>
					</label>
				</div>
				<label>
					<span>ZIP File</span>
					<input id="datasetFile" name="datasetFile" type="file" accept=".zip,application/zip">
				</label>
				<div class="action-row">
					<button class="primary-action" type="submit">
						<i data-lucide="upload"></i>
						Upload
					</button>
					<p class="status-text" id="uploadStatus" role="status"></p>
				</div>
			</form>

			<section class="panel dataset-panel">
				<div class="panel-heading">
					<div>
						<p class="eyebrow">Stored</p>
						<h2>Datasets</h2>
					</div>
					<button class="icon-button" id="refreshDatasets" type="button" aria-label="Refresh datasets" title="Refresh datasets">
						<i data-lucide="refresh-cw"></i>
					</button>
				</div>
				<div class="table-wrap">
					<table>
						<thead>
							<tr>
								<th>ID</th>
								<th>Kind</th>
								<th>Rows</th>
								<th></th>
							</tr>
						</thead>
						<tbody id="datasetTableBody"></tbody>
					</table>
				</div>
				<p class="empty-state" id="datasetEmpty">No datasets loaded.</p>
			</section>
		</section>

		<section class="workbench" aria-label="Query workbench">
			<div class="panel query-panel">
				<div class="panel-heading">
					<div>
						<p class="eyebrow">Workbench</p>
						<h2>Query Builder</h2>
					</div>
					<div class="query-actions">
						<button class="secondary-action" id="formatQuery" type="button">
							<i data-lucide="align-left"></i>
							Format
						</button>
						<button class="secondary-action" id="copyQuery" type="button">
							<i data-lucide="copy"></i>
							Copy
						</button>
					</div>
				</div>
				<div class="query-controls">
					<label>
						<span>Dataset</span>
						<select id="datasetSelect"></select>
					</label>
					<label>
						<span>Template</span>
						<select id="templateSelect"></select>
					</label>
				</div>
				<textarea id="queryEditor" spellcheck="false"></textarea>
				<div class="action-row">
					<button class="primary-action" id="runQuery" type="button">
						<i data-lucide="play"></i>
						Run Query
					</button>
					<button class="secondary-action" id="resetQuery" type="button">
						<i data-lucide="rotate-ccw"></i>
						Reset
					</button>
					<p class="status-text" id="queryStatus" role="status"></p>
				</div>
			</div>

			<section class="panel results-panel">
				<div class="panel-heading">
					<div>
						<p class="eyebrow">Output</p>
						<h2>Results</h2>
					</div>
					<p class="result-summary" id="resultSummary">No query run yet.</p>
				</div>
				<div class="chart-area" id="chartArea">
					<p class="empty-state">Run a template query to render a chart.</p>
				</div>
				<div class="table-wrap results-table-wrap">
					<table id="resultsTable">
						<thead id="resultsTableHead"></thead>
						<tbody id="resultsTableBody"></tbody>
					</table>
				</div>
				<details class="json-details">
					<summary>JSON</summary>
					<pre id="resultJson">[]</pre>
				</details>
			</section>
		</section>
	</main>
</body>
</html>
